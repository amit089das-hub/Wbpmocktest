<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
    <title>Login - WB Police Mock Test</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 350px; position: relative; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: #2ecc71; }
        .forgot-password { text-align: right; margin-top: -5px; margin-bottom: 15px; }
        .forgot-password a { color: #e74c3c; font-size: 13px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .forgot-password a:hover { text-decoration: underline; }
        .btn-submit { background: #2ecc71; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-submit:hover { background: #27ae60; }
        .toggle-text { margin-top: 15px; font-size: 14px; color: #aaa; cursor: pointer; text-decoration: underline; }
        .or-divider { margin: 20px 0; color: #555; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .or-divider::before, .or-divider::after { content: ""; flex: 1; height: 1px; background: #333; }
        .btn-google { background: #fff; color: #333; border: none; padding: 10px; font-size: 15px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-google:hover { background: #f1f1f1; }
        
        /* Modal Style for Forgot Password */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: #222; padding: 25px; border-radius: 10px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #333; }
        .modal-content h3 { margin-top: 0; color: #fff; margin-bottom: 15px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { background: #555; color: white; border: none; padding: 10px; border-radius: 5px; flex: 1; cursor: pointer; }
        .btn-send { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; flex: 1; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 id="form-title">লগইন করুন</h2>
        
        <div class="input-group" id="group-username" style="display: none;">
            <label for="username">আপনার নাম</label>
            <input type="text" id="username" placeholder="আপনার সম্পূর্ণ নাম লিখুন">
        </div>
        <div class="input-group" id="group-phone" style="display: none;">
            <label for="phone">মোবাইল নাম্বার</label>
            <input type="tel" id="phone" placeholder="১০ সংখ্যার মোবাইল নাম্বার">
        </div>

        <div class="input-group">
            <label for="email">ইমেইল আইডি</label>
            <input type="email" id="email" placeholder="example@email.com">
        </div>
        <div class="input-group">
            <label for="password">পাসওয়ার্ড</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="forgot-password" id="forgot-password-wrapper">
            <a id="btn-forgot-password">পাসওয়ার্ড ভুলে গেছেন?</a>
        </div>

        <button class="btn-submit" id="btn-action">লগইন</button>
        
        <p class="toggle-text" id="btn-toggle">নতুন অ্যাকাউন্ট তৈরি করতে চান? সাইন-আপ করুন</p>
        
        <div class="or-divider">অথবা</div>
        
        <button class="btn-google" id="btn-google">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google দিয়ে সাইন-ইন করুন
        </button>
    </div>

    <div class="modal" id="forgot-modal">
        <div class="modal-content">
            <h3>পাসওয়ার্ড রিসেট</h3>
            <p style="font-size: 14px; color: #aaa; margin-bottom: 15px;">আপনার নিবন্ধিত ইমেল আইডিটি লিখুন। আমরা পাসওয়ার্ড রিসেট করার একটি লিংক পাঠাবো।</p>
            <div class="input-group">
                <input type="email" id="forgot-email" placeholder="আপনার ইমেইল দিন">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-forgot-cancel">বাতিল</button>
                <button class="btn-send" id="btn-forgot-send">লিংক পাঠান</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        

        const firebaseConfig = {
            apiKey: "AIzaSyCoBw6-MTBXtIJPEvP9qB7I3JFpJ7MZM5I",
            authDomain: "mocktest0.firebaseapp.com",
            projectId: "mocktest0",
            storageBucket: "mocktest0.firebasestorage.app",
            messagingSenderId: "251833325363",
            appId: "1:251833325363:web:8bdd09a4b717bf045e9046",
            measurementId: "G-6P2P3WS42H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, {
  localCache: persistentLocalCache({
    tabManager: persistentMultipleTabManager()
  })
});
        const googleProvider = new GoogleAuthProvider();

        // জিমেইল পপআপ বার বার আটকে যাওয়া রোধ করতে কাস্টম প্যারামিটার
        googleProvider.setCustomParameters({ prompt: 'select_account' });

        let isLoginMode = true;

        const formTitle = document.getElementById('form-title');
        const btnAction = document.getElementById('btn-action');
        const btnToggle = document.getElementById('btn-toggle');
        const groupUsername = document.getElementById('group-username');
        const groupPhone = document.getElementById('group-phone');
        const forgotPasswordWrapper = document.getElementById('forgot-password-wrapper');

        // মডাল এলিমেন্টসমূহ
        const forgotModal = document.getElementById('forgot-modal');
        const btnForgotPassword = document.getElementById('btn-forgot-password');
        const btnForgotCancel = document.getElementById('btn-forgot-cancel');
        const btnForgotSend = document.getElementById('btn-forgot-send');

        // লগইন ও সাইন-আপ ফর্ম টগল
        btnToggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.innerText = "লগইন করুন";
                btnAction.innerText = "লগইন";
                btnToggle.innerText = "নতুন অ্যাকাউন্ট তৈরি করতে চান? সাইন-আপ করুন";
                groupUsername.style.display = "none";
                groupPhone.style.display = "none";
                forgotPasswordWrapper.style.display = "block";
            } else {
                formTitle.innerText = "নতুন অ্যাকাউন্ট তৈরি করুন";
                btnAction.innerText = "রেজিস্ট্রেশন করুন";
                btnToggle.innerText = "অলরেডি অ্যাকাউন্ট আছে? লগইন করুন";
                groupUsername.style.display = "block";
                groupPhone.style.display = "block";
                forgotPasswordWrapper.style.display = "none";
            }
        });

        // ইমেল এবং পাসওয়ার্ড দিয়ে অ্যাকশন লজিক
        btnAction.addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!email || !password) {
                alert("দয়া করে ইমেল এবং পাসওয়ার্ড দুটিই লিখুন!");
                return;
            }

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => { window.location.href = "dashboard.html"; })
                    .catch((error) => { alert("লগইন ব্যর্থ হয়েছে: " + error.message); });
            } else {
                if (!username || !phone) {
                    alert("দয়া করে আপনার নাম এবং মোবাইল নাম্বার লিখুন!");
                    return;
                }

                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        
                        setDoc(doc(db, "users", user.uid), {
                            uid: user.uid,
                            name: username,
                            mobile: phone,
                            email: email,
                            progress: 0,
                            purchasedExams: {
                                wb_police: false,
                                wbpsc: false,
                                railway: false,
                                tet: false 
                            },
                            createdAt: new Date()
                        })
                        .then(() => {
                            alert("অ্যাকাউন্ট তৈরি এবং তথ্য সেভ সফল হয়েছে!");
                            window.location.href = "dashboard.html";
                        })
                        .catch((dbError) => {
                            console.error("ডাটাবেসে সেভ করতে সমস্যা হয়েছে: ", dbError);
                            window.location.href = "dashboard.html"; 
                        });
                    })
                    .catch((error) => { alert("অ্যাকাউন্ট তৈরি করা যায়নি: " + error.message); });
            }
        });

        // ফিক্সড গুগল সাইন-ইন লজিক
        document.getElementById('btn-google').addEventListener('click', () => {
            signInWithPopup(auth, googleProvider)
                .then((result) => {
                    const user = result.user;
                    
                    setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: user.displayName || "Google User",
                        email: user.email,
                        mobile: user.phoneNumber || "Google Sign-In",
                        progress: 0,
                        purchasedExams: {
                            wb_police: false,
                            wbpsc: false,
                            railway: false,
                            tet: false
                        },
                        createdAt: new Date()
                    }, { merge: true })
                    .then(() => {
                        window.location.href = "dashboard.html";
                    })
                    .catch((err) => {
                        console.error("গুগল ডাটা সেভ ইরর:", err);
                        window.location.href = "dashboard.html";
                    });
                })
                .catch((error) => { 
                    console.error("গুগল সাইন-ইন ইরর:", error);
                    alert("গুগল লগইন সম্পন্ন করা যায়নি। দয়া করে আবার চেষ্টা করুন বা ইমেল ব্যবহার করুন।"); 
                });
        });

        // ফরগেট পাসওয়ার্ড মডাল কন্ট্রোল
        btnForgotPassword.addEventListener('click', () => { forgotModal.style.display = 'flex'; });
        btnForgotCancel.addEventListener('click', () => { forgotModal.style.display = 'none'; });

        btnForgotSend.addEventListener('click', () => {
            const forgotEmail = document.getElementById('forgot-email').value.trim();
            if(!forgotEmail) {
                alert("দয়া করে আপনার ইমেল আইডিটি টাইপ করুন!");
                return;
            }

            sendPasswordResetEmail(auth, forgotEmail)
                .then(() => {
                    alert("আপনার ইমেলে পাসওয়ার্ড রিসেট করার লিংক পাঠানো হয়েছে। দয়া করে ইনবক্স বা স্প্যাম ফোল্ডার চেক করুন।");
                    forgotModal.style.display = 'none';
                    document.getElementById('forgot-email').value = "";
                })
                .catch((error) => {
                    alert("রিসেন্ট লিংক পাঠানো যায়নি: " + error.message);
                });
        });
    </script>
</body>
</html>
