<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Mock Test Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
            padding: 15px 15px 90px 15px; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .header h2 { margin: 0 0 5px 0; font-size: 20px; color: #2ecc71; }
        .header p { margin: 0; font-size: 14px; color: #aaa; }
        
        .tabs { display: flex; gap: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; overflow-x: auto; }
        .tab { cursor: pointer; color: #aaa; padding-bottom: 5px; white-space: nowrap; font-size: 15px; }
        .tab.active { color: #fff; border-bottom: 2px solid #2ecc71; font-weight: bold; }
        
        .list-container-wrapper { flex: 1; }
        .list-item { background: #1e1e1e; padding: 15px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #252525; }
        .btn-start { color: #4a90e2; font-weight: bold; text-decoration: none; font-size: 14px; }
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-size: 14px; }
        .back-btn:hover { background: #444; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: #1e1e1e; border-top: 1px solid #333; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #aaa; text-decoration: none; font-size: 12px; cursor: pointer; background: none; border: none; padding: 5px; }
        .nav-item.active { color: #2ecc71; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="exam-title">Free Test Mock Test Portal</h2>
        <p id="exam-desc">সম্পূর্ণ বিনামূল্যে নিচের মক টেস্টগুলোতে অংশগ্রহণ করুন।</p>
    </div>

    <div class="tabs" id="main-tabs">
        <div class="tab active" id="tab-main" data-cat="mock">Mock</div>
        <div class="tab" id="tab-pyp" data-cat="pyp">PYP</div>
        <div class="tab" id="tab-subject" data-cat="subject">Subject Test</div>
        <div class="tab" id="tab-current" data-cat="current">Current Affairs</div>
    </div>

    <div class="list-container-wrapper">
        <div id="list-container"></div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div>
            <span>Home</span>
        </a>
        <a href="mocktestcomming.html" class="nav-item">
            <div class="nav-icon">📝</div>
            <span>Tests</span>
        </a>
        <a href="https://wa.me/916294005916?text=নমস্কার,%20আমার%20একটি%20সমস্যা%20হচ্ছে।" target="_blank" class="nav-item" style="color: #25D366;">
            <div class="nav-icon">💬</div>
            <span>WhatsApp</span>
        </a>
        <button class="nav-item" id="btn-logout">
            <div class="nav-icon">🚪</div>
            <span>Logout</span>
        </button>
    </div>
    <script src="data.js"></script>

    <script>
        // ফ্রি টেস্টের ডেটা লোড করা হচ্ছে 
        const freeData = megaData["free_test"];
        let currentCategory = 'mock'; // ডিফল্ট ক্যাটাগরি
        let navigationHistory = []; // ব্যাক বাটনের হিস্টোরি ট্র্যাক করার জন্য

        // পেজ লোড হলে প্রথম রান হবে
        window.onload = function() {
            initFreePortal();
        };

        function initFreePortal() {
            setupTabs();
            loadCategory(currentCategory);
        }

        // ট্যাব ক্লিক হ্যান্ডলার সেটআপ
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    tabs.forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    currentCategory = e.target.getAttribute('data-cat');
                    navigationHistory = []; // নতুন ট্যাবে গেলে হিস্টোরি ক্লিয়ার হবে
                    loadCategory(currentCategory);
                });
            });
        }

        // মূল ক্যাটাগরি লোড করার ফাংশন
        function loadCategory(categoryType) {
            if (!freeData || !freeData[categoryType]) {
                document.getElementById('list-container').innerHTML = '<p style="color:#aaa; padding:15px;">আপাতত কোনো টেস্ট উপলব্ধ নেই।</p>';
                return;
            }
            // হিস্টোরি খালি করে একদম শুরুর ডেটা পুশ করা হচ্ছে
            navigationHistory = [freeData[categoryType]];
            renderCurrentLevel();
        }

        // স্ক্রিনে ডেটা রেন্ডার করার ডায়নামিক ফাংশন
        function renderCurrentLevel() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            // কারেন্ট লেভেলের ডেটা হিস্টোরির শেষ উপাদান থেকে আসবে
            const currentData = navigationHistory[navigationHistory.length - 1];

            // যদি হিস্টোরিতে ১টির বেশি ডেটা থাকে, তবেই ব্যাক বাটন দেখাবে
            if (navigationHistory.length > 1) {
                const backBtn = document.createElement('button');
                backBtn.className = 'back-btn';
                backBtn.textContent = '← Back';
                backBtn.onclick = goBack;
                container.appendChild(backBtn);
            }

            // ১. চেক করা হচ্ছে এটা ফাইনাল টেস্টের অ্যারে (Array) কিনা
            if (Array.isArray(currentData)) {
                currentData.forEach(mockObject => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `<span>📝 ${mockObject.name}</span><a href="${mockObject.link}" class="btn-start">START TEST ➔</a>`;
                    container.appendChild(item);
                });
            } 
            // ২. যদি এটা অবজেক্ট (Object) হয়, তার মানে ভেতরে আরও ফোল্ডার/ক্যাটাগরি আছে
            else if (typeof currentData === 'object' && currentData !== null) {
                const keys = Object.keys(currentData);
                if(keys.length === 0) {
                    container.innerHTML += '<p style="color:#aaa; padding:15px;">কোনো ডেটা খুঁজে পাওয়া যায়নি।</p>';
                    return;
                }

                keys.forEach(keyName => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `<span>📁 ${keyName}</span><span style="color:#2ecc71;">➔</span>`;
                    
                    // ফোল্ডারে ক্লিক করলে ওই ডেটা হিস্টোরিতে পুশ হবে এবং পেজ রি-রেন্ডার হবে
                    item.onclick = () => {
                        navigationHistory.push(currentData[keyName]);
                        renderCurrentLevel();
                    };
                    container.appendChild(item);
                });
            }
        }

        // ব্যাক বাটনের কাজ
        function goBack() {
            if (navigationHistory.length > 1) {
                navigationHistory.pop(); // শেষ এলিমেন্ট বাদ দেওয়া হলো
                renderCurrentLevel(); // আগের লেভেল রেন্ডার করা হলো
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoBw6-MTBXtIJPEvP9qB7I3JFpJ7MZM5I",
            authDomain: "mocktest0.firebaseapp.com",
            projectId: "mocktest0",
            storageBucket: "mocktest0.firebasestorage.app",
            messagingSenderId: "251833325363",
            appId: "1:251833325363:web:8bdd09a4b717bf045e9046",
            measurementId: "G-6P2P3WS42H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // লগআউট বাটনের কাজ
        document.getElementById('btn-logout').addEventListener('click', () => {
            if(confirm("আপনি কি নিশ্চিতভাবে লগআউট করতে চান?")) {
                signOut(auth).then(() => { 
                    window.location.href = "login.html"; 
                }).catch((error) => {
                    alert("লগআউট করতে সমস্যা হয়েছে: " + error.message);
                });
            }
        });
    </script>
</body>
</html>
