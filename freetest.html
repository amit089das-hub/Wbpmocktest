<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Mock Test Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
            padding: 15px 15px 90px 15px; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .header h2 { margin: 0 0 5px 0; font-size: 20px; color: #2ecc71; }
        .header p { margin: 0; font-size: 14px; color: #aaa; }
        
        .tabs { display: flex; gap: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; overflow-x: auto; }
        .tab { cursor: pointer; color: #aaa; padding-bottom: 5px; white-space: nowrap; font-size: 15px; }
        .tab.active { color: #fff; border-bottom: 2px solid #2ecc71; font-weight: bold; }
        
        .list-container-wrapper { flex: 1; }
        .list-item { background: #1e1e1e; padding: 15px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #252525; }
        .btn-start { color: #4a90e2; font-weight: bold; text-decoration: none; font-size: 14px; }
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-size: 14px; }
        .back-btn:hover { background: #444; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: #1e1e1e; border-top: 1px solid #333; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #aaa; text-decoration: none; font-size: 12px; cursor: pointer; background: none; border: none; padding: 5px; }
        .nav-item.active { color: #2ecc71; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Free Test Mock Test Portal</h2>
        <p>বিনামূল্যে মক টেস্ট দিন এবং আপনার প্রস্তুতি যাচাই করুন।</p>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-wbp_free_mock">EXAM</div>
        <div class="tab" id="tab-pyp">PYQ</div>
        <div class="tab" id="tab-subject">Subject Test</div>
        <div class="tab" id="tab-current">Current Affairs</div>
    </div>

    <div class="list-container-wrapper">
        <div id="list-container"></div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div>
            <span>Home</span>
        </a>
        <a href="freetest.html?exam=free_test" class="nav-item active">
            <div class="nav-icon">📝</div>
            <span>Free Tests</span>
        </a>
        <a href="https://wa.me/916294005916?text=নমস্কার" target="_blank" class="nav-item" style="color: #25D366;">
            <div class="nav-icon">💬</div>
            <span>WhatsApp</span>
        </a>
        <button class="nav-item" id="btn-logout">
            <div class="nav-icon">🚪</div>
            <span>Logout</span>
        </button>
    </div>

    <script>
        let data = null; 
        const container = document.getElementById('list-container');
        let navigationHistory = [];

        window.onload = function() {
            initFreeTestPortal();
        };

        // ⚡ [Instant Local Data Read Enabled]
        async function initFreeTestPortal() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentExamKey = urlParams.get('exam') || 'free_test';

            // ১. নেটওয়ার্ক রিকোয়েস্টের আগেই ক্যাশ করা ডেটা লোকাল স্টোরেজ থেকে ইনস্ট্যান্টলি রেন্ডার হবে
            const cachedJSON = localStorage.getItem(`cache_json_${currentExamKey}`);
            if (cachedJSON) {
                try {
                    data = JSON.parse(cachedJSON);
                    switchCategory('wbp_free_mock', document.getElementById('tab-wbp_free_mock'));
                    console.log("FreeTest: লোকাল ক্যাশ থেকে ইনস্ট্যান্ট ডেটা রিড হয়েছে!");
                } catch(e) {
                    console.error("Cache parse error", e);
                }
            } else {
                container.innerHTML = '<p style="color:#aaa; padding:15px;">মক টেস্টের ডেটা লোড হচ্ছে...</p>';
            }

            try {
                // ২. ব্যাকগ্রাউন্ডে নেটওয়ার্ক থেকে লেটেস্ট ফাইলটি নামানো হচ্ছে
                const response = await fetch(`./data/${currentExamKey}.json`);
                
                if (!response.ok) {
                    throw new Error("JSON file could not be fetched.");
                }

                const freshData = await response.json(); 

                // ৩. যদি ক্যাশ করা ডেটার সাথে নতুন ডেটার কোনো পার্থক্য থাকে, তবেই স্ক্রিন আপডেট হবে (ফ্লিকারিং বন্ধ করতে)
                if (JSON.stringify(data) !== JSON.stringify(freshData)) {
                    data = freshData;
                    localStorage.setItem(`cache_json_${currentExamKey}`, JSON.stringify(freshData)); // নতুন ডেটা ক্যাশ হলো
                    switchCategory('wbp_free_mock', document.getElementById('tab-wbp_free_mock'));
                }

            } catch (error) {
                console.error("Error loading JSON data: ", error);
                // যদি আগে থেকে কোনো ক্যাশ ডেটা না থাকে এবং নেটওয়ার্কও ফেইল করে, তখনই কেবল এরর দেখাবে
                if (!data) {
                    container.innerHTML = '<p style="color:#e74c3c; padding:15px;">দুঃখিত, মক টেস্টের ডেটা লোড করা যায়নি। অনুগ্রহ করে ফাইল পাথ চেক করুন।</p>';
                }
            }
        }

        function switchCategory(categoryType, tabElement) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(tabElement) tabElement.classList.add('active');
            
            navigationHistory = []; 

            if (!data) {
                container.innerHTML = '<p style="color:#aaa; padding:15px;">কোনো ডেটা উপলব্ধ নেই।</p>';
                return;
            }

            let categoryData = data[categoryType];
            if (!categoryData) {
                categoryData = data[categoryType.toUpperCase()] || data[categoryType.toLowerCase()];
            }

            if (!categoryData || Object.keys(categoryData).length === 0) {
                container.innerHTML = '<p style="color:#aaa; padding:15px;">আপাতত কোনো টেস্ট উপলব্ধ নেই।</p>';
                return;
            }

            const firstLevelData = [];
            Object.keys(categoryData).forEach(key => {
                firstLevelData.push({ name: key, type: 'folder', children: categoryData[key] });
            });

            navigationHistory.push({ title: 'Root', data: firstLevelData });
            renderCurrentLevel();
        }

        function renderCurrentLevel() {
            container.innerHTML = '';
            const currentLevel = navigationHistory[navigationHistory.length - 1];

            if (navigationHistory.length > 1) {
                const backBtn = document.createElement('button');
                backBtn.className = 'back-btn';
                backBtn.textContent = '← Back';
                backBtn.onclick = goBack;
                container.appendChild(backBtn);
            }

            currentLevel.data.forEach(item => {
                if (item.type === 'folder') {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span>📁 ${item.name}</span><span style="color:#2ecc71;">➔</span>`;
                    div.onclick = () => {
                        let nextData = [];
                        if (Array.isArray(item.children)) {
                            item.children.forEach(test => {
                                nextData.push({ ...test, type: 'test' });
                            });
                        } else if (typeof item.children === 'object') {
                            Object.keys(item.children).forEach(k => {
                                nextData.push({ name: k, type: 'folder', children: item.children[k] });
                            });
                        }
                        navigationHistory.push({ title: item.name, data: nextData });
                        renderCurrentLevel();
                    };
                    container.appendChild(div);
                } else if (item.type === 'test') {
                    renderFinalTestItem(item);
                }
            });
        }

        function renderFinalTestItem(mockObject) {
            const itemCard = document.createElement('div');
            
            const isComingSoon = !mockObject.link || mockObject.link.trim() === "" || mockObject.link.toLowerCase() === "coming soon";
            
            const buttonHtml = isComingSoon 
                ? `<button disabled style="background: #555; color: #aaa; border: none; padding: 8px 15px; border-radius: 5px; cursor: not-allowed; font-weight: bold;">Coming Soon</button>`
                : `<button onclick="window.location.href='${mockObject.link}'" style="background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Start</button>`;

            itemCard.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: space-between; background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 8px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div style="width: 40px; height: 40px; background: ${isComingSoon ? '#444' : '#2563eb'}; color: white; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px;">
                            ${isComingSoon ? '🔒' : '📄'}
                        </div>
                        <div>
                            <h3 style="margin: 0; font-size: 16px; color: #fff;">${mockObject.name}</h3>
                            <p style="margin: 5px 0 0 0; font-size: 13px; color: #aaa;">
                                ⏳ সময়: ${mockObject.time || 'N/A'} | 📝 প্রশ্ন: ${mockObject.totalQ || 'N/A'} টি
                            </p>
                        </div>
                    </div>
                    ${buttonHtml}
                </div>
            `;
            container.appendChild(itemCard);
        }

        function goBack() {
            if (navigationHistory.length > 1) {
                navigationHistory.pop();
                renderCurrentLevel();
            }
        }

        document.getElementById('tab-wbp_free_mock').addEventListener('click', (e) => switchCategory('wbp_free_mock', e.target));
        document.getElementById('tab-pyp').addEventListener('click', (e) => switchCategory('pyp', e.target));
        document.getElementById('tab-subject').addEventListener('click', (e) => switchCategory('subject', e.target));
        document.getElementById('tab-current').addEventListener('click', (e) => switchCategory('current', e.target));
    </script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        

        const firebaseConfig = {
            apiKey: "AIzaSyCoBw6-MTBXtIJPEvP9qB7I3JFpJ7MZM5I",
            authDomain: "mocktest0.firebaseapp.com",
            projectId: "mocktest0",
            storageBucket: "mocktest0.firebasestorage.app",
            messagingSenderId: "251833325363",
            appId: "1:251833325363:web:8bdd09a4b717bf045e9046",
            measurementId: "G-6P2P3WS42H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, {
          localCache: persistentLocalCache({
            tabManager: persistentMultipleTabManager()
          })
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            if(confirm("আপনি কি নিশ্চিতভাবে লগআউট করতে চান?")) {
                localStorage.clear(); 
                signOut(auth).then(() => { window.location.href = "login.html"; });
            }
        });
    </script>
</body>
</html>
